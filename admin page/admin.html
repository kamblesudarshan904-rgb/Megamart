<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        if (localStorage.getItem("adminLogged") !== "true") {
            alert("Access Denied! You must login first.");
            window.location.href = "../admin login.html"; 
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    
    <style>
        .product-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .product-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 15px;
        }
        .product-info {
            flex-grow: 1;
        }
        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .delete-btn:hover { background: #d32f2f; }
    </style>
</head>
<body>

<div class="admin-wrapper">

    <div class="admin-left">
        <div class="shape"></div>
        <button onclick="logoutAdmin()" style="margin-top: 20px; background: #fff; color: #333; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold;">Logout</button>
    </div>

    <div class="admin-right">
        <h2>Admin Panel</h2>
        
        <p class="typewriter">Add New Product</p>
        <form id="productForm" style="margin-bottom: 40px;">
            <input type="text" id="name" placeholder="Product Name" required>
            <input type="number" id="price" placeholder="Price" required>
            <label style="display:block; margin-bottom:5px; color:#666;">Product Image:</label>
            <input type="file" id="image" accept="image/*" required style="padding-top: 10px;">
            <textarea id="description" placeholder="Product Description"></textarea>
            <button type="submit">Add Product</button>
        </form>

        <h2 style="border-top: 2px solid #eee; padding-top: 20px;">Manage Products</h2>
        <div id="adminProductList">
            </div>

    </div>

</div>

<script src="admin.js"></script>
</body>
</html>
